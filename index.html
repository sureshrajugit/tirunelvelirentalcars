<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tirunelveli Rental Cars — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;800&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#15171c;
    --asphalt-2:#1d2027;
    --cream:#f2efe9;
    --amber:#f2a13c;
    --amber-dim:#a86f23;
    --line:#3a3e47;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--asphalt);
    color:var(--cream);
    font-family:'Space Grotesk',sans-serif;
    overflow-x:hidden;
    position:relative;
  }

  /* road texture: dashed center-line running diagonally across the page */
  .road-line{
    position:fixed;
    top:0; left:50%;
    width:4px; height:100%;
    transform:translateX(-50%);
    background:repeating-linear-gradient(
      to bottom,
      var(--amber) 0 36px,
      transparent 36px 72px
    );
    opacity:.18;
    animation:drift 1.6s linear infinite;
    pointer-events:none;
  }
  @keyframes drift{ to{ background-position:0 72px; } }

  .noise{
    position:fixed; inset:0;
    background-image:radial-gradient(var(--line) .6px, transparent .6px);
    background-size:26px 26px;
    opacity:.12;
    pointer-events:none;
  }

  .wrap{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:6vh 6vw;
    text-align:center;
  }

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:.8rem;
    letter-spacing:.25em;
    text-transform:uppercase;
    color:var(--amber);
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:28px;
  }
  .eyebrow::before, .eyebrow::after{
    content:"";
    width:34px; height:1px;
    background:var(--amber-dim);
  }

  h1{
    font-family:'Archivo Expanded',sans-serif;
    font-weight:800;
    font-size:clamp(2rem, 6vw, 4.5rem);
    line-height:.95;
    letter-spacing:-.02em;
    text-transform:uppercase;
    margin-bottom:18px;
  }
  h1 span{
    color:var(--amber);
    -webkit-text-stroke:0;
  }

  .sub{
    max-width:480px;
    font-size:1.05rem;
    line-height:1.6;
    color:#c7c4bd;
    margin-bottom:48px;
  }

  /* signature element: odometer-style countdown */
  .odometer{
    display:flex;
    gap:10px;
    margin-bottom:52px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .od-unit{
    background:var(--asphalt-2);
    border:1px solid var(--line);
    border-radius:6px;
    padding:16px 20px;
    min-width:84px;
  }
  .od-num{
    font-family:'JetBrains Mono',monospace;
    font-size:2rem;
    font-weight:500;
    color:var(--amber);
    font-variant-numeric:tabular-nums;
  }
  .od-label{
    font-family:'JetBrains Mono',monospace;
    font-size:.65rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    color:#83807a;
    margin-top:6px;
  }

  form{
    display:flex;
    width:100%;
    max-width:420px;
    border:1px solid var(--line);
    border-radius:999px;
    overflow:hidden;
    background:var(--asphalt-2);
  }
  input[type="email"]{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    padding:16px 22px;
    color:var(--cream);
    font-family:'Space Grotesk',sans-serif;
    font-size:.95rem;
  }
  input[type="email"]::placeholder{ color:#6f6c66; }
  button{
    background:var(--amber);
    color:var(--asphalt);
    border:none;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:.92rem;
    padding:0 28px;
    cursor:pointer;
    transition:background .2s ease;
  }
  button:hover{ background:#ffb958; }
  button:focus-visible, input:focus-visible{
    outline:2px solid var(--amber);
    outline-offset:2px;
  }

  .note{
    margin-top:18px;
    font-family:'JetBrains Mono',monospace;
    font-size:.75rem;
    color:#6f6c66;
    letter-spacing:.04em;
  }

  footer{
    position:fixed;
    bottom:24px; left:0; right:0;
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:.7rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:#52504b;
  }

  @media (prefers-reduced-motion: reduce){
    .road-line{ animation:none; }
  }
</style>
</head>
<body>

<div class="road-line"></div>
<div class="noise"></div>

<div class="wrap">
  <p class="eyebrow">Tirunelveli Car Rental</p>
  <h1>Tirunelveli Rental Cars<br><span>coming soon...</span></h1>
  <p class="sub">We're paving the last stretch before launch. Sign up and be first in line when the fleet goes live.</p>

  <div class="odometer" id="odometer" aria-label="Countdown to launch">
    <div class="od-unit"><div class="od-num" id="od-days">00</div><div class="od-label">Days</div></div>
    <div class="od-unit"><div class="od-num" id="od-hours">00</div><div class="od-label">Hrs</div></div>
    <div class="od-unit"><div class="od-num" id="od-mins">00</div><div class="od-label">Min</div></div>
    <div class="od-unit"><div class="od-num" id="od-secs">00</div><div class="od-label">Sec</div></div>
  </div>
</div>

<footer>&copy; 2026 Tirunelveli Rental Cars — Somewhere down the road</footer>

<script>
  // Set your real launch date here (YYYY-MM-DDTHH:MM:SS)
  const launchDate = new Date();
  launchDate.setDate(launchDate.getDate() + 10);

  function pad(n){ return String(n).padStart(2,'0'); }

  function tick(){
    const now = new Date();
    let diff = Math.max(0, launchDate - now);

    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);

    document.getElementById('od-days').textContent = pad(days);
    document.getElementById('od-hours').textContent = pad(hours);
    document.getElementById('od-mins').textContent = pad(mins);
    document.getElementById('od-secs').textContent = pad(secs);
  }
  tick();
  setInterval(tick, 1000);

  document.getElementById('notify-form').addEventListener('submit', function(e){
    e.preventDefault();
    const note = document.getElementById('form-note');
    const email = document.getElementById('email-input').value;
    // Replace this with your real signup endpoint / form action
    note.textContent = "You're on the list — see you at launch, " + email.split('@')[0] + ".";
    document.getElementById('email-input').value = '';
  });
</script>

</body>
</html>
